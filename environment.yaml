# ============================================================
# GCN Action Recognition - Conda Environment
# Usage: conda env create -f environment.yaml
#        conda activate gcn-action-recognition
# ============================================================

name: gcn-action-recognition
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────
  - python=3.10

  # ── Core Deep Learning (CUDA 12.1) ───────────────────────
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=12.1

  # ── Graph Neural Networks ────────────────────────────────
  - pyg::pyg
  - pyg::pytorch-scatter
  - pyg::pytorch-sparse
  - pyg::pytorch-cluster

  # ── Numerical / Scientific ───────────────────────────────
  - numpy>=1.24.0
  - scipy>=1.11.0
  - pandas>=2.0.0

  # ── Computer Vision ──────────────────────────────────────
  - opencv>=4.8.0

  # ── Config Management ────────────────────────────────────
  - pyyaml>=6.0

  # ── Evaluation & Visualization ───────────────────────────
  - scikit-learn>=1.4.0
  - matplotlib>=3.8.0
  - seaborn>=0.13.0

  # ── Notebooks ────────────────────────────────────────────
  - jupyter>=1.0.0
  - ipykernel>=6.29.0
  - ipywidgets>=8.1.0

  # ── Testing ──────────────────────────────────────────────
  - pytest>=8.0.0
  - pytest-cov>=4.1.0

  # ── Utilities ────────────────────────────────────────────
  - tqdm>=4.66.1
  - rich>=13.7.0

  # ── Pip-only packages ────────────────────────────────────
  - pip
  - pip:
      # Config
      - omegaconf>=2.3.0
      - hydra-core>=1.3.2

      # Skeleton extraction
      - mediapipe>=0.10.0

      # API
      - fastapi>=0.110.0
      - uvicorn[standard]>=0.27.0
      - pydantic>=2.5.0
      - python-multipart>=0.0.9

      # Demo
      - streamlit>=1.32.0

      # Logging & Experiment Tracking
      - tensorboard>=2.15.0
      - wandb>=0.16.0

      # Model Export
      - onnx>=1.15.0
      - onnxruntime>=1.17.0

      # Testing (async client cho FastAPI)
      - httpx>=0.27.0

      # Utilities
      - einops>=0.7.0
